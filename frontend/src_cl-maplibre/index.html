<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS — MapLibre Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="loading">
  <div class="load-logo">ATLAS</div>
  <div class="load-bar"><div class="load-bar-fill"></div></div>
  <div class="load-sub">INITIALIZING MAP ENGINE</div>
</div>

<header id="topbar">
  <div class="logo"><div class="logo-dot"></div>ATLAS</div>
  <div class="divider"></div>
  <div class="coord-display">
    <div>LAT <span id="lat-val">—</span></div>
    <div>LNG <span id="lng-val">—</span></div>
    <div>ZOOM <span id="zoom-val">—</span></div>
    <div id="temp-hud" style="display:none;"><span id="temp-hud-label">TEMP</span> <span id="temp-val">—</span></div>
    <div id="wind-hud" style="display:none;"><span id="wind-hud-label">WIND</span> <span id="wind-val">—</span></div>
  </div>
  <div class="proj-topbar">
    <button class="proj-tb-btn active" data-proj="mercator">MERCATOR</button>
    <button class="proj-tb-btn" data-proj="globe">GLOBE</button>
  </div>
</header>

<aside id="sidebar">
  <div class="panel-header">
    <div class="panel-label">Layers</div>
  </div>

  <div class="section" draggable="true" data-layer="temp-layer">
    <div class="section-title">
      <span class="drag-handle">⠿</span>
      <span id="temp-layer-name">Temperature Layer</span>
      <label class="toggle">
        <input type="checkbox" id="temp-toggle" checked />
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="slider-row">
      <span class="slider-label">OPACITY</span>
      <input type="range" class="opacity-slider" id="temp-opacity" min="0" max="100" value="70" />
      <span class="slider-label" id="opacity-val">70%</span>
    </div>
    <div class="legend">
      <div class="legend-bar"></div>
      <div class="legend-ticks">
        <span>−2°C</span><span>—</span><span>35°C</span>
      </div>
    </div>
  </div>

  <div class="section" draggable="true" data-layer="wind-layer">
    <div class="section-title">
      <span class="drag-handle">⠿</span>
      <span id="wind-layer-name">Wind Speed Layer</span>
      <label class="toggle">
        <input type="checkbox" id="wind-toggle" checked />
        <span class="toggle-track"></span>
      </label>
    </div>
    <div class="slider-row">
      <span class="slider-label">OPACITY</span>
      <input type="range" class="opacity-slider" id="wind-opacity" min="0" max="100" value="70" />
      <span class="slider-label" id="wind-opacity-val">70%</span>
    </div>
    <div class="legend">
      <div class="legend-bar" style="background: linear-gradient(to right,
        rgba(145, 65, 46, 0),
        rgba(244, 179, 63, 128),
        rgba(255, 252, 212, 255));"></div>
      <div class="legend-ticks">
        <span>0</span><span>—</span><span>50</span>
      </div>
    </div>
  </div>

  <div class="sidebar-spacer"></div>

  <div class="engine-row">
    <span>MAPLIBRE GL JS</span>
    <span>v5.0.0</span>
  </div>
</aside>

<div id="map-wrap">
  <div id="map"></div>
  <div class="crosshair"></div>

  <div class="map-controls">
    <button class="map-btn" id="btn-zoom-in"  title="Zoom in">+</button>
    <button class="map-btn" id="btn-zoom-out" title="Zoom out">−</button>
    <div class="map-btn sep"></div>
    <button class="map-btn" id="btn-north"  title="Reset north" style="font-size:11px;">N</button>
    <button class="map-btn" id="btn-3d"     title="Toggle 3D pitch" style="font-size:10px;">3D</button>
    <div class="map-btn sep"></div>
    <button class="map-btn" id="btn-locate" title="My location" style="font-size:12px;">◎</button>
  </div>

  <div class="scale-bar">
    <div class="scale-line"></div>
    <div class="scale-label" id="scale-label">— KM</div>
  </div>

  <div id="toast"></div>
</div>

<script src="https://unpkg.com/maplibre-gl@5.0.0/dist/maplibre-gl.js"></script>
<script src="app.js"></script>
</body>
</html>
